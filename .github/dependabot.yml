version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/qfplugin-{{cookiecutter.plugin_name_slug}}"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
      - "dependencies"

  - package-ecosystem: "uv"
    directory: "/qfplugin-{{cookiecutter.plugin_name_slug}}"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
