stages:
  - 🛠️ pre
  - 🎳 tests

variables:
  PLUGIN_DIR: "{{ cookiecutter.plugin_name_slug }}"
  PYTHON_IMAGE_TAG: "3.12"
  PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit

pre:pre-commit:
  stage: 🛠️ pre
  image: python:${PYTHON_IMAGE_TAG}
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  before_script:
    - apt update && apt install -y git pipx
  script:
    - pipx run pre-commit run --all-files --show-diff-on-failure --color always

# Requires a CI/CD variable: GITLAB_TOKEN (project/personal access token with `api` scope)
pre:mr-zip-and-qr:
  stage: 🛠️ pre
  image: python:${PYTHON_IMAGE_TAG}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ${PLUGIN_DIR}/**/*
        - .gitlab-ci.yml
        - scripts/**/*
  before_script:
    - apt update && apt install -y zip curl jq qt6-base-dev qt6-tools-dev-tools
    - pip install qrcode[pil] --quiet
  script:
    # Set variables for the ZIP artifact and QR code
    - ZIP_NAME="{{ cookiecutter.plugin_name_slug }}-mr-${CI_MERGE_REQUEST_IID}-${CI_COMMIT_SHORT_SHA}.zip"
    - ARTIFACT_BASE_URL="${CI_SERVER_URL}/${CI_PROJECT_PATH}/-/jobs/${CI_JOB_ID}/artifacts/raw"
    - ZIP_URL="${ARTIFACT_BASE_URL}/${ZIP_NAME}"
    - QR_URL="${ARTIFACT_BASE_URL}/qrcode.png"

    # Compile translations
    - /usr/lib/qt6/bin/lrelease "${PLUGIN_DIR}"/*.ts

    # Zip the QField plugin
    - cd "${PLUGIN_DIR}" && zip -r "../${ZIP_NAME}" ./* && cd ..

    # Generate QR code pointing to the ZIP artifact
    - FILE_URL="${ZIP_URL}" python3 ./scripts/generate_qr_code.py

    # Build the comment body and post it to the MR
    - bash ./scripts/gitlab/post_mr_comment.sh "${ZIP_NAME}" "${ZIP_URL}" "${QR_URL}"

  artifacts:
    name: "{{ cookiecutter.plugin_name_slug }}-mr-${CI_MERGE_REQUEST_IID}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - "{{ cookiecutter.plugin_name_slug }}-mr-*.zip"
      - qrcode.png
    expire_in: 4 weeks

tests:qftests:
  stage: 🎳 tests
  image: qgis/qgis:${QGIS_IMAGE_TAG}
  parallel:
    matrix:
      - QGIS_IMAGE_TAG:
          # list the accurate QGIS image tags to test against
          # see: https://hub.docker.com/r/qgis/qgis/tags
          - stable-trixie
        QFIELD_REF:
          # list the QField branches to test against
          - release-4_2
          - master
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ${PLUGIN_DIR}/*.qml
        - tests/**/*
        - .gitlab-ci.yml
  variables:
    QGIS_IN_CI: "1"
  before_script:
    - apt update
    - apt install -y qt6-websockets-dev qml6-module-qtcore qml6-module-qtmultimedia python3-pyqt6.qtqml python3-pyqt6.qtquick python3-pyqt6.qtmultimedia
    - pip install uv --break-system-packages
  script:
    - git clone --depth 1 --branch "${QFIELD_REF}" https://github.com/opengisch/QField.git QField
    - uv venv --system-site-packages
    - SITE_PACKAGES=$(uv run python -c "import site; print(site.getsitepackages()[0])")
    - echo "/usr/share/qgis/python" > "${SITE_PACKAGES}/qgis.pth"
    - uv sync
    - xvfb-run uv run pytest tests -v --qgis_disable_gui
