name: 📥 Zip & QR Code

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed
    paths:
      - '{{ cookiecutter.plugin_name_slug }}/**'
      - '.github/workflows/pr_qrcode.yml'
      - 'scripts/**'

jobs:
  zip-and-qr:
    name: 📱 Generate ZIP and QR code for PR
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure variables used later in the workflow
        id: config
        run: |
          DIRECTORY="{{ cookiecutter.plugin_name_slug }}"
          ZIP_NAME="{{ cookiecutter.plugin_name_slug }}-pr-${{ github.event.pull_request.number }}-${{ github.sha }}.zip"
          TAG_NAME="pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
          TAG_PREFIX="pr-${{ github.event.pull_request.number }}-"
          echo "directory=$DIRECTORY" >> $GITHUB_OUTPUT
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "tag_prefix=$TAG_PREFIX" >> $GITHUB_OUTPUT
          echo "sha_short=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Delete previous pre-releases for this PR
        uses: actions/github-script@v9
        env:
          TAG_PREFIX: ${{ steps.config.outputs.tag_prefix }}
        with:
          script: |
            const script = require('./scripts/github/delete-pr-prereleases.js')
            await script({ github, context })

      - name: Install qt tools dependencies
        run: |
          sudo apt update
          sudo apt install -y qt6-base-dev qt6-tools-dev-tools
          echo "/usr/lib/qt6/bin" >> "$GITHUB_PATH"

      - name: Compile translations
        run: lrelease {{ cookiecutter.plugin_name_slug }}/translations.pro

      - name: Zip the QField plugin
        run: |
          cd ${{ steps.config.outputs.directory }}
          zip -r "../${{ steps.config.outputs.zip_name }}" ./*

      - name: Generate QR code
        run: |
          pip install qrcode[pil] --quiet
          python3 ./scripts/generate_qr_code.py
        env:
          FILE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.config.outputs.tag_name }}/${{ steps.config.outputs.zip_name }}

      - name: Create pre-release with the ZIP and the QR code
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.config.outputs.tag_name }}
          name: "PR #${{ github.event.pull_request.number }} - {{ cookiecutter.plugin_name_slug }}"
          prerelease: true
          body: |
            This pre-release contains the ZIP artefact and the QR code for PR #${{ github.event.pull_request.number }}.
            It was generated from commit `${{ steps.config.outputs.sha_short }}`.
            It will be automatically deleted when the PR is closed.

            Flash the following QR code in QField to test the plugin:

            <img src="https://github.com/${{ github.repository }}/releases/download/${{ steps.config.outputs.tag_name }}/qrcode.png" alt="QR Code" width="360"/>
          files: |
            ${{ steps.config.outputs.zip_name }}
            qrcode.png
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find existing bot comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: 📦 Artefacts generated

      - name: Create or update comment on the Pull Request
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## 📦 Artefacts generated

            | Element | Value |
            |------|-------|
            | 📥 ZIP file | [`${{ steps.config.outputs.zip_name }}`](https://github.com/${{ github.repository }}/releases/download/${{ steps.config.outputs.tag_name }}/${{ steps.config.outputs.zip_name }}) |
            | 🏷️ Tag | `${{ steps.config.outputs.tag_name }}` |
            | 🔑 Commit | `${{ steps.config.outputs.sha_short }}` |
            | 🆕 Pre-release | [`PR #${{ github.event.pull_request.number }} - {{ cookiecutter.plugin_name_slug }}`](https://github.com/${{ github.repository }}/releases/tag/${{ steps.config.outputs.tag_name }}) |

            ---

            ### 📱 QR Code: Flash in QField to test
            <img src="https://github.com/${{ github.repository }}/releases/download/${{ steps.config.outputs.tag_name }}/qrcode.png" alt="QR Code" width="360"/>

  cleanup:
    name: 🧹 Cleanup on PR close
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Delete all pre-releases for this PR
        uses: actions/github-script@v9
        env:
          TAG_PREFIX: pr-${{ github.event.pull_request.number }}-
        with:
          script: |
            const script = require('./scripts/github/delete-pr-prereleases.js')
            await script({ github, context })

      - name: Find bot comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: 📦 Artefacts generated

      - name: Delete bot comment
        if: steps.find-comment.outputs.comment-id != ''
        uses: actions/github-script@v9
        env:
          COMMENT_ID: ${{ steps.find-comment.outputs.comment-id }}
        with:
          script: |
            const script = require('./scripts/github/delete-bot-comment.js')
            await script({ github, context })
