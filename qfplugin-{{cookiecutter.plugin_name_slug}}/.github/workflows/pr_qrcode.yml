name: 📥 Zip & QR Code

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed
    paths:
      - '{{ cookiecutter.plugin_name_slug }}/**'
      - '.github/workflows/pr_qrcode.yml'
      - 'scripts/**'

jobs:
  zip-and-qr:
    name: 📱 Generate ZIP and QR code for PR
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure variables used later in the workflow
        id: config
        run: |
          DIRECTORY="{{ cookiecutter.plugin_name_slug }}"
          ZIP_NAME="{{ cookiecutter.plugin_name_slug }}-pr-{% raw %}${{ github.event.pull_request.number }}-${{ github.sha }}{% endraw %}.zip"
          TAG_NAME="pr-{% raw %}${{ github.event.pull_request.number }}-${{ github.sha }}{% endraw %}"
          TAG_PREFIX="pr-{% raw %}${{ github.event.pull_request.number }}-{% endraw %}"
          echo "directory=$DIRECTORY" >> $GITHUB_OUTPUT
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "tag_prefix=$TAG_PREFIX" >> $GITHUB_OUTPUT
          echo "sha_short=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Delete previous pre-releases for this PR
        uses: actions/github-script@v9
        env:
          TAG_PREFIX: "{% raw %}${{ steps.config.outputs.tag_prefix }}{% endraw %}"
        with:
          script: |
            const script = require('./scripts/github/delete-pr-prereleases.js')
            await script({ github, context })

      - name: Install qt tools dependencies
        run: |
          sudo apt update
          sudo apt install -y qt6-base-dev qt6-tools-dev-tools
          echo "/usr/lib/qt6/bin" >> "$GITHUB_PATH"

      - name: Compile translations
        run: lrelease {{ cookiecutter.plugin_name_slug }}/*.ts

      - name: Zip the QField plugin
        run: |
          cd "{% raw %}${{ steps.config.outputs.directory }}{% endraw %}"
          zip -r "../{% raw %}${{ steps.config.outputs.zip_name }}{% endraw %}" ./*

      - name: Generate QR code
        run: |
          pip install qrcode[pil] --quiet
          python3 ./scripts/generate_qr_code.py
        env:
          FILE_URL: https://github.com/{% raw %}${{ github.repository }}{% endraw %}/releases/download/{% raw %}${{ steps.config.outputs.tag_name }}{% endraw %}/{% raw %}${{ steps.config.outputs.zip_name }}{% endraw %}

      - name: Create pre-release with the ZIP and the QR code
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "{% raw %}${{ steps.config.outputs.tag_name }}{% endraw %}"
          name: "PR #{% raw %}${{ github.event.pull_request.number }}{% endraw %} - {{ cookiecutter.plugin_name_slug }}"
          prerelease: true
          body: |
            This pre-release contains the ZIP artefact and the QR code for PR #{% raw %}${{ github.event.pull_request.number }}{% endraw %}.
            It was generated from commit `{% raw %}${{ steps.config.outputs.sha_short }}{% endraw %}`.
            It will be automatically deleted when the PR is closed.

            Flash the following QR code in QField to test the plugin:

            <img src="https://github.com/{% raw %}${{ github.repository }}{% endraw %}/releases/download/{% raw %}${{ steps.config.outputs.tag_name }}{% endraw %}/qrcode.png" alt="QR Code" width="360"/>
          files: |
            {% raw %}${{ steps.config.outputs.zip_name }}{% endraw %}
            qrcode.png
          token: "{% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}"

      - name: Find existing bot comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: "{% raw %}${{ github.event.pull_request.number }}{% endraw %}"
          comment-author: github-actions[bot]
          body-includes: 📦 Artefacts generated

      - name: Create or update comment on the Pull Request
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: "{% raw %}${{ steps.find-comment.outputs.comment-id }}{% endraw %}"
          issue-number: "{% raw %}${{ github.event.pull_request.number }}{% endraw %}"
          edit-mode: replace
          body: |
            ## 📦 Artefacts generated

            | Element | Value |
            |------|-------|
            | 📥 ZIP file | [`{% raw %}${{ steps.config.outputs.zip_name }}{% endraw %}`](https://github.com/{% raw %}${{ github.repository }}{% endraw %}/releases/download/{% raw %}${{ steps.config.outputs.tag_name }}{% endraw %}/{% raw %}${{ steps.config.outputs.zip_name }}{% endraw %}) |
            | 🏷️ Tag | `{% raw %}${{ steps.config.outputs.tag_name }}{% endraw %}` |
            | 🔑 Commit | `{% raw %}${{ steps.config.outputs.sha_short }}{% endraw %}` |
            | 🆕 Pre-release | [`PR #{% raw %}${{ github.event.pull_request.number }}{% endraw %} - {{ cookiecutter.plugin_name_slug }}`](https://github.com/{% raw %}${{ github.repository }}{% endraw %}/releases/tag/{% raw %}${{ steps.config.outputs.tag_name }}{% endraw %}) |

            ---

            ### 📱 QR Code: Flash in QField to test
            <img src="https://github.com/{% raw %}${{ github.repository }}{% endraw %}/releases/download/{% raw %}${{ steps.config.outputs.tag_name }}{% endraw %}/qrcode.png" alt="QR Code" width="360"/>

  cleanup:
    name: 🧹 Cleanup on PR close
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Delete all pre-releases for this PR
        uses: actions/github-script@v9
        env:
          TAG_PREFIX: "pr-{% raw %}${{ github.event.pull_request.number }}{% endraw %}-"
        with:
          script: |
            const script = require('./scripts/github/delete-pr-prereleases.js')
            await script({ github, context })

      - name: Find bot comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: "{% raw %}${{ github.event.pull_request.number }}{% endraw %}"
          comment-author: github-actions[bot]
          body-includes: 📦 Artefacts generated

      - name: Delete bot comment
        if: steps.find-comment.outputs.comment-id != ''
        uses: actions/github-script@v9
        env:
          COMMENT_ID: "{% raw %}${{ steps.find-comment.outputs.comment-id }}{% endraw %}"
        with:
          script: |
            const script = require('./scripts/github/delete-bot-comment.js')
            await script({ github, context })
